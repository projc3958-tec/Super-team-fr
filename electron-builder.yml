appId: com.superjobstudio.app
productName: Super Job Studio
copyright: Super Job Studio

files:
  - electron/**/*
  - .next/**/*
  - pages/**/*
  - next.config.js
  - package.json
  - node_modules/**/*

asar: false

win:
  target:
    - target: nsis
      arch: x64
    - target: portable
      arch: x64

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  shortcutName: Super Job Studio
